			outputPaths = (
				"$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/rg",
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -e\n\nRIPGREP_VERSION=\"15.1.0\"\nRIPGREP_CACHE_DIR=\"${DERIVED_FILE_DIR}/ripgrep-cache\"\nRIPGREP_CACHED_PATH=\"${RIPGREP_CACHE_DIR}/rg-${RIPGREP_VERSION}\"\nRIPGREP_DEST=\"${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Resources/rg\"\n\nmkdir -p \"${RIPGREP_CACHE_DIR}\"\nmkdir -p \"${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Resources\"\n\n# Check if we have a cached version\nif [ -f \"${RIPGREP_CACHED_PATH}\" ] && [ -x \"${RIPGREP_CACHED_PATH}\" ] && [ $(stat -f%z \"${RIPGREP_CACHED_PATH}\") -gt 1000 ]; then\n    echo \"✓ Using cached ripgrep binary\"\n    cp \"${RIPGREP_CACHED_PATH}\" \"${RIPGREP_DEST}\"\n    chmod +x \"${RIPGREP_DEST}\"\n    echo \"✓ ripgrep binary copied to app bundle: ${RIPGREP_DEST}\"\nelse\n    echo \"Downloading ripgrep ${RIPGREP_VERSION} for aarch64...\"\n    \n    # Download tar.gz from GitHub releases\n    URL=\"https://github.com/BurntSushi/ripgrep/releases/download/${RIPGREP_VERSION}/ripgrep-${RIPGREP_VERSION}-aarch64-apple-darwin.tar.gz\"\n    TMP_DIR=\"${TMPDIR:-/tmp}/ripgrep-download-$$\"\n    \n    mkdir -p \"${TMP_DIR}\"\n    \n    # Download and extract\n    if curl -L \"${URL}\" | tar -xz -C \"${TMP_DIR}\" 2>/dev/null; then\n        # Copy to cache\n        cp \"${TMP_DIR}/ripgrep-${RIPGREP_VERSION}-aarch64-apple-darwin/rg\" \"${RIPGREP_CACHED_PATH}\"\n        chmod +x \"${RIPGREP_CACHED_PATH}\"\n        echo \"✓ Downloaded ripgrep ($(stat -f%z \"${RIPGREP_CACHED_PATH}\") bytes)\"\n        \n        # Copy to bundle\n        cp \"${RIPGREP_CACHED_PATH}\" \"${RIPGREP_DEST}\"\n        chmod +x \"${RIPGREP_DEST}\"\n        echo \"✓ ripgrep binary copied to app bundle: ${RIPGREP_DEST}\"\n        \n        # Cleanup\n        rm -rf \"${TMP_DIR}\"\n    else\n        echo \"error: ❌ Failed to download ripgrep\"\n        rm -rf \"${TMP_DIR}\"\n        exit 1\n    fi\nfi\n\n# Sign the ripgrep binary with hardened runtime for archiving\nif [ -n \"${EXPANDED_CODE_SIGN_IDENTITY}\" ] && [ \"${CONFIGURATION}\" = \"Release\" ]; then\n    echo \"🔏 Signing ripgrep binary with hardened runtime...\"\n    /usr/bin/codesign --force --sign \"${EXPANDED_CODE_SIGN_IDENTITY}\" \\\n        --timestamp=none \\\n        --options runtime \\\n        --generate-entitlement-der \\\n        \"${RIPGREP_DEST}\" 2>&1\n    \n    if codesign -v \"${RIPGREP_DEST}\" 2>/dev/null; then\n        echo \"✅ ripgrep binary signature verified\"\n    else\n        echo \"⚠️  Warning: ripgrep binary signature verification failed\"\n    fi\nelse\n    echo \"ℹ️  Skipping ripgrep binary signing (Debug build or no identity)\"\nfi\n\necho \"✓ ripgrep binary ready\"\n";
